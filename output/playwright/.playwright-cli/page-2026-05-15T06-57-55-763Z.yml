        - generic [ref=e69]: 01 / 为什么很多投入没有真正沉淀下来
        - heading "流量并不总是最大问题，留不下来才是。" [level=2] [ref=e70]
        - paragraph [ref=e71]: 很多品牌并不缺促销、投放和终端活动，真正被反复消耗的，是每次触达之后没有后续连接，下一次增长还得重新花钱把用户找回来。
        - list [ref=e72]:
          - listitem [ref=e73]: 让活动带来的人群不只停留在当次转化。
          - listitem [ref=e74]: 让终端和渠道投入逐步沉淀为品牌自有用户。
          - listitem [ref=e75]: 让下一次复购和触达不必重新从公域开始。
