        - heading "扫码不只是领取动作，更是品牌建立关系的入口。" [level=2] [ref=e85]
        - paragraph [ref=e86]: 一物一码当然可以服务促销和核销，但更重要的价值在于，把一次短暂接触变成会员留资、内容触达和后续运营的起点。
        - list [ref=e87]:
          - listitem [ref=e88]: 承接包装、门店和活动中的用户触点。
          - listitem [ref=e89]: 让扫码用户更自然地进入会员连接。
          - listitem [ref=e90]: 为新品种草、节点活动和复购提醒留下后续空间。
        - link "查看完整方案" [ref=e91] [cursor=pointer]:
